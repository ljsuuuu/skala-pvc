apiVersion: apps/v1
kind: Deployment
metadata:
  name: sk3021-frontend
  namespace: skala3-ai1
  labels:
    app: sk3021-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sk3021-frontend
  template:
    metadata:
      labels:
        app: sk3021-frontend
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
      - name: vue-container
        # CD 파이프라인에서 이 부분을 동적으로 변경합니다.
        image: amdp-registry.skala-ai.com/skala26a-ai1/a3021_vue:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sk3021-frontend-svc
  namespace: skala3-ai1
spec:
  type: ClusterIP
  selector:
    app: sk3021-frontend
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 80